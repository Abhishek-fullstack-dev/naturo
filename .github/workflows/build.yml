name: Build & Test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-dll:
    name: Build C++ Core (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S core -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run C++ tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: naturo-core-dll
          path: |
            build/bin/Release/naturo_core.dll
            build/lib/Release/naturo_core.lib
          if-no-files-found: error

  build-python:
    name: Python Tests with DLL (Windows)
    runs-on: windows-latest
    needs: build-dll
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download DLL
        uses: actions/download-artifact@v4
        with:
          name: naturo-core-dll
          path: naturo/bin/

      - name: Flatten DLL into naturo/bin
        shell: bash
        run: |
          # download-artifact preserves the directory structure
          if [ -d "naturo/bin/bin/Release" ]; then
            cp naturo/bin/bin/Release/*.dll naturo/bin/ 2>/dev/null || true
          fi
          if [ -d "naturo/bin/lib/Release" ]; then
            cp naturo/bin/lib/Release/*.lib naturo/bin/ 2>/dev/null || true
          fi
          ls -la naturo/bin/

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run all tests
        run: pytest -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: naturo-python-tested
          path: naturo/bin/naturo_core.dll
          if-no-files-found: warn

  lint-and-test-python:
    name: Python Tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests (skip DLL tests)
        run: pytest -v

  release:
    name: Release
    runs-on: windows-latest
    needs: [build-dll, build-python, lint-and-test-python]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download DLL
        uses: actions/download-artifact@v4
        with:
          name: naturo-core-dll
          path: release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
